name: LeafLore CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ─── Test Suite ──────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: pytest tests/ -q --tb=short --junitxml=test-results.xml
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: sqlite:///test_ci.db
          FLASK_ENV: testing
          WTF_CSRF_ENABLED: "false"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ─── Security Scan ───────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install audit tools
        run: pip install bandit safety pip-audit

      - name: Run Bandit (static security analysis)
        run: |
          bandit -r . \
            --exclude venv,.venv,tests,migrations \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r . \
            --exclude venv,.venv,tests,migrations \
            --severity-level high \
            --confidence-level high
        continue-on-error: false

      - name: Run pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt --ignore-vuln GHSA-not-exist || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ─── Code Quality ────────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install quality tools
        run: pip install flake8

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; warn on style
          flake8 . \
            --exclude=venv,.venv,migrations,__pycache__ \
            --max-line-length=120 \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
